<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="monospace, sans-serif">
  <!-- Background -->
  <rect width="900" height="620" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="bold">🦞 CodeGuard — Intent-Aware Developer Assistant</text>
  <text x="450" y="62" text-anchor="middle" fill="#64748b" font-size="13">ARMORIQ x OpenClaw Hackathon</text>

  <!-- ── User Input ── -->
  <rect x="330" y="85" width="240" height="50" rx="10" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="450" y="107" text-anchor="middle" fill="#93c5fd" font-size="13" font-weight="bold">User Instruction</text>
  <text x="450" y="125" text-anchor="middle" fill="#64748b" font-size="11">"Add docstring to utils/helpers.py"</text>

  <!-- Arrow down -->
  <line x1="450" y1="135" x2="450" y2="165" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>

  <!-- ── Reasoning Layer ── -->
  <rect x="270" y="165" width="360" height="75" rx="10" fill="#1e293b" stroke="#8b5cf6" stroke-width="2"/>
  <text x="450" y="188" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="bold">① REASONING LAYER</text>
  <text x="450" y="207" text-anchor="middle" fill="#a78bfa" font-size="11">intent_parser.py  →  Claude API / Heuristic</text>
  <text x="450" y="224" text-anchor="middle" fill="#64748b" font-size="11">{ action, target_file, scope, reason }</text>

  <!-- Arrow down -->
  <line x1="450" y1="240" x2="450" y2="268" stroke="#8b5cf6" stroke-width="2" marker-end="url(#arrow-purple)"/>

  <!-- ── Policy Engine ── -->
  <rect x="210" y="268" width="480" height="120" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="450" y="291" text-anchor="middle" fill="#fcd34d" font-size="13" font-weight="bold">② ENFORCEMENT LAYER — PolicyEngine</text>
  <text x="450" y="311" text-anchor="middle" fill="#fbbf24" font-size="11">policy_engine.py  |  policy_config.py</text>
  
  <!-- Rule boxes -->
  <rect x="225" y="320" width="100" height="32" rx="6" fill="#292524" stroke="#f59e0b" stroke-width="1"/>
  <text x="275" y="332" text-anchor="middle" fill="#fcd34d" font-size="9">Rule 1</text>
  <text x="275" y="344" text-anchor="middle" fill="#e5e7eb" font-size="9">Action Blocked?</text>

  <rect x="337" y="320" width="100" height="32" rx="6" fill="#292524" stroke="#f59e0b" stroke-width="1"/>
  <text x="387" y="332" text-anchor="middle" fill="#fcd34d" font-size="9">Rule 2</text>
  <text x="387" y="344" text-anchor="middle" fill="#e5e7eb" font-size="9">Action Allowed?</text>

  <rect x="449" y="320" width="100" height="32" rx="6" fill="#292524" stroke="#f59e0b" stroke-width="1"/>
  <text x="499" y="332" text-anchor="middle" fill="#fcd34d" font-size="9">Rule 3</text>
  <text x="499" y="344" text-anchor="middle" fill="#e5e7eb" font-size="9">File Protected?</text>

  <rect x="561" y="320" width="110" height="32" rx="6" fill="#292524" stroke="#f59e0b" stroke-width="1"/>
  <text x="616" y="332" text-anchor="middle" fill="#fcd34d" font-size="9">Rule 4</text>
  <text x="616" y="344" text-anchor="middle" fill="#e5e7eb" font-size="9">In Allowed Dir?</text>

  <!-- Arrows from policy engine -->
  <line x1="340" y1="388" x2="270" y2="425" stroke="#22c55e" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="280" y="415" fill="#22c55e" font-size="11" font-weight="bold">✅ ALLOW</text>

  <line x1="560" y1="388" x2="640" y2="425" stroke="#ef4444" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="590" y="415" fill="#ef4444" font-size="11" font-weight="bold">❌ BLOCK</text>

  <!-- ── Executor ── -->
  <rect x="130" y="430" width="220" height="65" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="453" text-anchor="middle" fill="#86efac" font-size="13" font-weight="bold">③ EXECUTION LAYER</text>
  <text x="240" y="470" text-anchor="middle" fill="#4ade80" font-size="11">executor.py</text>
  <text x="240" y="486" text-anchor="middle" fill="#64748b" font-size="10">read / edit / add_docstring / fix_style</text>

  <!-- ── Logger ── -->
  <rect x="560" y="430" width="200" height="65" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="660" y="453" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">BLOCKED + LOGGED</text>
  <text x="660" y="470" text-anchor="middle" fill="#f87171" font-size="11">logger.py</text>
  <text x="660" y="486" text-anchor="middle" fill="#64748b" font-size="10">reason logged to file + terminal</text>

  <!-- ── Real file system ── -->
  <rect x="130" y="530" width="220" height="50" rx="10" fill="#0f1117" stroke="#22c55e" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="240" y="550" text-anchor="middle" fill="#86efac" font-size="11">Real File System Action</text>
  <text x="240" y="566" text-anchor="middle" fill="#64748b" font-size="10">workspace/src/utils/  |  workspace/src/helpers/</text>
  <line x1="240" y1="495" x2="240" y2="530" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- ── Delegation ── -->
  <rect x="635" y="530" width="220" height="60" rx="10" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
  <text x="745" y="550" text-anchor="middle" fill="#67e8f9" font-size="12" font-weight="bold">🤝 DELEGATE AGENT</text>
  <text x="745" y="566" text-anchor="middle" fill="#22d3ee" font-size="10">delegate_agent.py</text>
  <text x="745" y="580" text-anchor="middle" fill="#64748b" font-size="9">Stricter policy: src/utils only + read/docstring</text>

  <!-- Arrow main agent → delegate -->
  <line x1="660" y1="495" x2="700" y2="530" stroke="#06b6d4" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-cyan)"/>
  <text x="645" y="520" fill="#06b6d4" font-size="9">spawn</text>

  <!-- ── Arrow markers ── -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3b82f6"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#8b5cf6"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#06b6d4"/>
    </marker>
  </defs>
</svg>
